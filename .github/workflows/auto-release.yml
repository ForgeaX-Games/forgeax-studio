name: Auto release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  tag-and-release:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'auto/mirror-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from package.json
        id: ver
        run: |
          ver=$(node -p "require('./package.json').version")
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "tag=v$ver" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: check
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.ver.outputs.version }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog for this version
        if: steps.check.outputs.exists == 'false'
        id: notes
        run: |
          ver="${{ steps.ver.outputs.version }}"
          if [ -f CHANGELOG.md ]; then
            # Extract the section for this version (between ## v<ver> and the next ## v)
            notes=$(awk "/^## v${ver//./\\.}/{found=1; next} /^## v[0-9]/{if(found) exit} found{print}" CHANGELOG.md)
          fi
          if [ -z "$notes" ]; then
            notes="Release v${ver} — ForgeaX Studio"
          fi
          # Write to file to avoid escaping issues
          printf '%s\n' "$notes" > /tmp/release-notes.md
          cat /tmp/release-notes.md

      - name: Create tag and release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git tag -a "${{ steps.ver.outputs.tag }}" -m "ForgeaX Studio ${{ steps.ver.outputs.tag }}"
          git push origin "${{ steps.ver.outputs.tag }}"
          gh release create "${{ steps.ver.outputs.tag }}" \
            --title "ForgeaX Studio ${{ steps.ver.outputs.tag }}" \
            --notes-file /tmp/release-notes.md
