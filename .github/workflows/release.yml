name: Desktop release

# Builds the ForgeaX Studio desktop app installers and attaches them to a GitHub
# Release. Runs ONLY on a version tag (v*) or manual dispatch — never on every push.
#
# macOS is wired up today (mirrors the local `bun fx build desktop` path). Windows is
# scaffolded but commented until the sidecar/build is validated there. The produced
# installers are unsigned dev builds for now — see docs/desktop distribution notes
# for signing/notarization before a public 1.0.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos:
    name: macOS (.dmg / .app)
    runs-on: macos-14 # Apple Silicon
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: dtolnay/rust-toolchain@stable
      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with: { tool: wasm-pack }
      - name: Install + build engine (bun fx setup)
        run: bun fx setup
        env:
          FORGEAX_SKIP_HARNESS_SYNC: "1"
      - name: Package desktop app (bun fx build desktop)
        run: bun fx build desktop
        env:
          CI: "true"
      - name: Create DMG (macOS hdiutil fallback)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          BUNDLE_DIR="packages/interface/src-tauri/target/release/bundle"
          APP_SRC="${BUNDLE_DIR}/macos/ForgeaX Studio.app"
          VERSION=$(node -p "require('./package.json').version")
          ARCH=$(uname -m | sed 's/arm64/aarch64/;s/x86_64/x64/')
          DMG_DIR="${BUNDLE_DIR}/dmg"
          DMG_OUT="${DMG_DIR}/ForgeaX Studio_${VERSION}_${ARCH}.dmg"
          if [ -f "$DMG_OUT" ]; then
            echo "DMG already present: $DMG_OUT"
            exit 0
          fi
          test -d "$APP_SRC" || { echo "missing .app at $APP_SRC"; exit 1; }
          STAGE=$(mktemp -d)
          cp -R "$APP_SRC" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          mkdir -p "$DMG_DIR"
          hdiutil create -volname "ForgeaX Studio" -srcfolder "$STAGE" -ov -format UDZO "$DMG_OUT"
          rm -rf "$STAGE"
          ls -la "$DMG_DIR"
      - name: Collect artifacts
        run: |
          mkdir -p dist
          BUNDLE="packages/interface/src-tauri/target/release/bundle"
          cp "$BUNDLE/dmg/"*.dmg dist/ 2>/dev/null || true
          cp "$BUNDLE/macos/"*.dmg dist/ 2>/dev/null || true
          ( cd "$BUNDLE/macos" && zip -ry "$GITHUB_WORKSPACE/dist/ForgeaX-Studio-macos.zip" "ForgeaX Studio.app" ) || true
          ls -lh dist || true
      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: false
      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: forgeax-studio-macos
          path: dist/*
          if-no-files-found: warn

