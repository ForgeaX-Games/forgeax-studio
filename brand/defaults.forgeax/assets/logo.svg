<svg xmlns="http://www.w3.org/2000/svg" viewBox="-6.5 -13 90 90" width="100%" height="100%" shape-rendering="crispEdges">
  <defs>
    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- All elements use 5px as the base unit (= 1 background char cell) -->

  <!-- The Iron Ingot (X Shape) - Pure White -->
  <g filter="url(#neon-glow)">
    <g fill="#ffffff">
      <rect x="15" y="30" width="10" height="10" />
      <rect x="55" y="30" width="10" height="10" />
      <rect x="15" y="60" width="10" height="10" />
      <rect x="55" y="60" width="10" height="10" />
      <rect x="25" y="40" width="30" height="20" />
    </g>
    <g fill="#ffffff">
      <animate attributeName="opacity" values="0.7; 1; 0.7" keyTimes="0; 0.25; 1" dur="1.5s" repeatCount="indefinite" />
      <rect x="15" y="30" width="10" height="10" />
      <rect x="55" y="30" width="10" height="10" />
      <rect x="15" y="60" width="10" height="10" />
      <rect x="55" y="60" width="10" height="10" />
      <rect x="25" y="40" width="30" height="20" />
    </g>
  </g>

  <!-- Flame - Red Outer (Pixel arc base) -->
  <g filter="url(#neon-glow)" transform="translate(0, 5)">
    <g fill="rgba(255, 40, 20, 0.95)">
      <!-- Layer 1 (bottom) - Fixed -->
      <rect x="35" y="35" width="10" height="5" />
      <!-- Layer 2 - ±1 -->
      <rect x="30" y="30" width="20" height="5">
        <animate attributeName="x" values="30; 29; 31; 30" dur="0.45s" repeatCount="indefinite" />
      </rect>
      <!-- Layer 3 - ±2 -->
      <rect x="25" y="25" width="30" height="5">
        <animate attributeName="x" values="25; 23; 27; 25" dur="0.4s" repeatCount="indefinite" />
      </rect>
      <!-- Layer 4 - ±3 -->
      <rect x="20" y="20" width="40" height="5">
        <animate attributeName="x" values="20; 17; 23; 20" dur="0.35s" repeatCount="indefinite" />
      </rect>
      <rect x="25" y="10" width="30" height="10">
        <animate attributeName="x" values="25; 20; 30; 25" dur="0.25s" repeatCount="indefinite" />
        <animate attributeName="y" values="10; 5; 15; 10" dur="0.3s" repeatCount="indefinite" />
      </rect>
      <rect x="30" y="-5" width="20" height="15">
        <animate attributeName="x" values="30; 25; 35; 30" dur="0.15s" repeatCount="indefinite" />
        <animate attributeName="y" values="-5; -10; 0; -5" dur="0.2s" repeatCount="indefinite" />
      </rect>
      <rect x="25" y="0" width="10" height="10">
        <animate attributeName="x" values="25; 20; 30; 25" dur="0.22s" repeatCount="indefinite" />
        <animate attributeName="y" values="0; -5; 5; 0" dur="0.28s" repeatCount="indefinite" />
      </rect>
      <rect x="45" y="-5" width="10" height="10">
        <animate attributeName="x" values="45; 50; 40; 45" dur="0.18s" repeatCount="indefinite" />
        <animate attributeName="y" values="-5; 0; -10; -5" dur="0.26s" repeatCount="indefinite" />
      </rect>
      <!-- Sparks -->
      <rect x="35" y="-15" width="5" height="5">
        <animate attributeName="opacity" values="1; 0; 1" dur="0.3s" repeatCount="indefinite" />
        <animate attributeName="y" values="-15; -25; -15" dur="0.3s" repeatCount="indefinite" />
        <animate attributeName="x" values="35; 30; 40; 35" dur="0.2s" repeatCount="indefinite" />
      </rect>
      <rect x="50" y="-5" width="5" height="5">
        <animate attributeName="opacity" values="0; 1; 0" dur="0.4s" repeatCount="indefinite" />
        <animate attributeName="y" values="-5; -15; -5" dur="0.4s" repeatCount="indefinite" />
        <animate attributeName="x" values="50; 55; 45; 50" dur="0.3s" repeatCount="indefinite" />
      </rect>
      <rect x="25" y="-10" width="5" height="5">
        <animate attributeName="opacity" values="0; 1; 0" dur="0.35s" repeatCount="indefinite" />
        <animate attributeName="y" values="-10; -20; -10" dur="0.35s" repeatCount="indefinite" />
        <animate attributeName="x" values="25; 20; 30; 25" dur="0.25s" repeatCount="indefinite" />
      </rect>
    </g>

    <!-- Flame - Orange Middle (Pixel arc) -->
    <g fill="rgba(255, 140, 0, 0.95)">
      <rect x="35" y="30" width="10" height="5" />
      <rect x="30" y="25" width="20" height="5">
        <animate attributeName="x" values="30; 28; 32; 30" dur="0.4s" repeatCount="indefinite" />
      </rect>
      <rect x="30" y="15" width="20" height="10">
        <animate attributeName="x" values="30; 25; 35; 30" dur="0.2s" repeatCount="indefinite" />
        <animate attributeName="y" values="15; 10; 20; 15" dur="0.25s" repeatCount="indefinite" />
      </rect>
      <rect x="35" y="5" width="10" height="10">
        <animate attributeName="y" values="5; 0; 10; 5" dur="0.2s" repeatCount="indefinite" />
        <animate attributeName="x" values="35; 30; 40; 35" dur="0.15s" repeatCount="indefinite" />
      </rect>
    </g>

    <!-- Flame - Yellow Core (Pixel arc) -->
    <g fill="rgba(255, 220, 50, 0.95)">
      <rect x="35" y="25" width="10" height="5" />
      <rect x="35" y="20" width="10" height="5">
        <animate attributeName="x" values="35; 30; 40; 35" dur="0.18s" repeatCount="indefinite" />
      </rect>
      <rect x="35" y="10" width="5" height="10">
        <animate attributeName="y" values="10; 5; 15; 10" dur="0.15s" repeatCount="indefinite" />
      </rect>
    </g>
  </g>

  <!-- Strike Sparks (Hidden by default, triggered on click) -->
  <g id="strikeSparks" opacity="0" filter="url(#neon-glow)">
    <animate id="sparkAnim" attributeName="opacity" values="0; 0; 1; 0; 0" keyTimes="0; 0.24; 0.25; 0.4; 1" dur="0.6s" begin="indefinite" repeatCount="1" fill="remove" />
    <rect x="60" y="25" width="5" height="5" fill="rgba(255, 200, 0, 1)">
      <animateTransform id="spark1" attributeName="transform" type="translate" values="0 0; 0 0; 10 -10; 10 -10" keyTimes="0; 0.24; 0.4; 1" dur="0.6s" begin="indefinite" repeatCount="1" fill="remove" />
    </rect>
    <rect x="65" y="20" width="5" height="5" fill="rgba(255, 255, 100, 1)">
      <animateTransform id="spark2" attributeName="transform" type="translate" values="0 0; 0 0; 15 -5; 15 -5" keyTimes="0; 0.24; 0.4; 1" dur="0.6s" begin="indefinite" repeatCount="1" fill="remove" />
    </rect>
    <rect x="60" y="30" width="5" height="5" fill="rgba(255, 200, 0, 1)">
      <animateTransform id="spark3" attributeName="transform" type="translate" values="0 0; 0 0; 10 5; 10 5" keyTimes="0; 0.24; 0.4; 1" dur="0.6s" begin="indefinite" repeatCount="1" fill="remove" />
    </rect>
  </g>

  <!-- The Hammer (Top Layer, Left Side) - Pure White -->
  <g transform="translate(5, 30)" filter="url(#neon-glow)">
    <g transform="rotate(-45 0 0)">
      <!-- Idle: gentle floating bob -->
      <animateTransform
        attributeName="transform"
        type="rotate"
        values="-45 0 0; -42 0 0; -48 0 0; -45 0 0"
        dur="2s"
        repeatCount="indefinite"
      />
      <!-- Strike: triggered on click -->
      <animateTransform
        id="hammerStrike"
        attributeName="transform"
        type="rotate"
        values="-45 0 0; -50 0 0; 10 0 0; -20 0 0; -45 0 0"
        keyTimes="0; 0.15; 0.25; 0.35; 1"
        dur="0.6s"
        begin="indefinite"
        repeatCount="1"
        fill="remove"
      />
      <!-- Handle -->
      <rect x="10" y="0" width="20" height="5" fill="#ffffff" />
      <!-- Hammer Head -->
      <rect x="30" y="-10" width="10" height="20" fill="#ffffff" />
    </g>
  </g>
</svg>
