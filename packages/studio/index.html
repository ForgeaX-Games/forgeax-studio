<!doctype html>
<html lang="zh-CN" data-theme="dark" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>%BRAND_PRODUCT_NAME%</title>
  <link rel="icon" type="image/svg+xml" href="/brand/assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* Boot splash — visible from page-load until React mounts. Two themes
       baked in (.t-classic-lime / .t-neon-pulse); the inline bootstrap below
       picks one based on localStorage. Switching themes / customizing copy
       happens in Settings → Boot splash (src/boot/SettingsSection.tsx); AI
       can also POST /api/boot-splash to mutate it. */
    html, body { margin: 0; padding: 0; background: #0e1216; color: #cfd6dc; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }

    /* ─── shared shell ──────────────────────────────────────────────────── */
    .fgx-boot {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      transition: opacity 280ms ease, visibility 0s linear 280ms;
    }
    .fgx-boot.is-leaving { opacity: 0; visibility: hidden; pointer-events: none; }
    .fgx-boot-card {
      width: min(520px, 100%);
      padding: 28px 26px 22px;
      border-radius: 14px;
      /* backdrop-filter 触发 GPU 合成,首帧偶发 200-500ms 延迟。改用更深的
         背景色 + 边框轮廓达到相似视觉重量,且立即可见。 */
    }
    .fgx-boot-head {
      display: flex; align-items: baseline; gap: 10px;
      padding-bottom: 14px; margin-bottom: 16px;
    }
    .fgx-boot-dot {
      width: 9px; height: 9px; border-radius: 50%;
      flex-shrink: 0;
    }
    .fgx-boot-title { font-weight: 600; font-size: 15px; letter-spacing: 0.5px; }
    .fgx-boot-sub { font-size: 11px; margin-left: auto; opacity: 0.5; }
    .fgx-boot-bar {
      position: relative;
      height: 4px;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .fgx-boot-bar-fill {
      position: absolute; inset: 0;
      width: 0%;
      transition: width 360ms cubic-bezier(0.34, 0.94, 0.45, 1.0);
    }
    .fgx-boot-bar-label {
      display: flex; justify-content: space-between;
      font-size: 10.5px; opacity: 0.55;
      margin-bottom: 14px;
      font-variant-numeric: tabular-nums;
    }
    .fgx-boot-inventory {
      font-size: 11px;
      opacity: 0.62;
      margin-bottom: 4px;
      letter-spacing: 0.2px;
    }
    .fgx-boot-inventory em { font-style: normal; font-weight: 600; }
    .fgx-boot-inventory code {
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 10px;
    }
    .fgx-boot-fault {
      display: none;
      margin-top: 16px;
      padding: 9px 11px;
      font-size: 10.5px;
      line-height: 1.5;
      border-radius: 6px;
      background: rgba(255, 90, 90, 0.06);
      border: 1px solid rgba(255, 90, 90, 0.25);
      color: rgba(255, 200, 200, 0.85);
    }
    .fgx-boot.is-faulted .fgx-boot-fault { display: block; }
    .fgx-boot-fault code {
      color: rgba(255, 220, 220, 0.9);
      background: rgba(255, 90, 90, 0.10);
      padding: 1px 4px;
      border-radius: 3px;
    }

    /* ─── theme: classic-lime ───────────────────────────────────────────── */
    .fgx-boot.t-classic-lime {
      background:
        radial-gradient(60% 50% at 50% 35%, rgba(212,255,72,0.06), transparent 70%),
        #0e1216;
    }
    .t-classic-lime .fgx-boot-card {
      background: rgba(20,24,28,0.78);
      border: 1px solid rgba(212,255,72,0.22);
      box-shadow:
        0 30px 60px rgba(0,0,0,0.50),
        inset 0 1px 0 rgba(255,255,255,0.05),
        0 0 0 1px rgba(212,255,72,0.08);
    }
    .t-classic-lime .fgx-boot-head { border-bottom: 1px solid rgba(212,255,72,0.14); }
    .t-classic-lime .fgx-boot-dot {
      background: rgba(212,255,72,0.95);
      box-shadow: 0 0 8px rgba(212,255,72,0.55);
    }
    .t-classic-lime .fgx-boot-title { color: rgba(212,255,72,0.92); }
    .t-classic-lime .fgx-boot-bar { background: rgba(255,255,255,0.06); }
    .t-classic-lime .fgx-boot-bar-fill {
      background: linear-gradient(90deg, rgba(212,255,72,0.85), rgba(212,255,72,0.55));
      box-shadow: 0 0 8px rgba(212,255,72,0.45);
    }
    .t-classic-lime .fgx-boot-inventory em { color: rgba(212,255,72,0.92); }
    .t-classic-lime .fgx-boot-inventory code {
      color: rgba(212,255,72,0.85);
      background: rgba(212,255,72,0.06);
    }

    /* ─── theme: neon-pulse ─────────────────────────────────────────────── */
    .fgx-boot.t-neon-pulse {
      background:
        radial-gradient(35% 35% at 50% 50%, rgba(125,211,252,0.16), transparent 70%),
        radial-gradient(60% 60% at 50% 50%, rgba(168,85,247,0.10), transparent 75%),
        #06080c;
      overflow: hidden;
    }
    .fgx-boot.t-neon-pulse::before {
      content: '';
      position: absolute; left: 50%; top: 50%;
      width: 340px; height: 340px;
      margin-left: -170px; margin-top: -170px;
      border-radius: 50%;
      border: 1px solid rgba(125,211,252,0.20);
      animation: fgx-pulse-ring 2.6s ease-out infinite;
      pointer-events: none;
    }
    .fgx-boot.t-neon-pulse::after {
      content: '';
      position: absolute; left: 50%; top: 50%;
      width: 220px; height: 220px;
      margin-left: -110px; margin-top: -110px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(125,211,252,0.08), transparent 70%);
      animation: fgx-pulse-glow 2.6s ease-out infinite;
      pointer-events: none;
    }
    @keyframes fgx-pulse-ring {
      0%   { transform: scale(0.78); opacity: 0.0; }
      35%  { opacity: 0.9; }
      100% { transform: scale(1.40); opacity: 0.0; }
    }
    @keyframes fgx-pulse-glow {
      0%, 100% { transform: scale(0.92); opacity: 0.6; }
      50%      { transform: scale(1.08); opacity: 1.0; }
    }
    .t-neon-pulse .fgx-boot-card {
      position: relative;
      background: rgba(6, 12, 20, 0.78);
      border: 1px solid rgba(125, 211, 252, 0.22);
      box-shadow:
        0 30px 80px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.05),
        0 0 32px rgba(125,211,252,0.18);
      z-index: 1;
    }
    .t-neon-pulse .fgx-boot-head { border-bottom: 1px solid rgba(125,211,252,0.20); }
    .t-neon-pulse .fgx-boot-dot {
      background: rgba(125,211,252,0.95);
      box-shadow: 0 0 10px rgba(125,211,252,0.65);
    }
    .t-neon-pulse .fgx-boot-title { color: rgba(125,211,252,0.92); letter-spacing: 1px; }
    .t-neon-pulse .fgx-boot-bar { background: rgba(255,255,255,0.05); }
    .t-neon-pulse .fgx-boot-bar-fill {
      background: linear-gradient(90deg, rgba(125,211,252,0.85), rgba(168,85,247,0.85));
      box-shadow: 0 0 12px rgba(125,211,252,0.55);
    }
    .t-neon-pulse .fgx-boot-inventory em { color: rgba(125,211,252,0.92); }
    .t-neon-pulse .fgx-boot-inventory code {
      color: rgba(168,85,247,0.92);
      background: rgba(168,85,247,0.08);
    }
  </style>
</head>
<body>
  <!-- splash 在 #root 之前,浏览器流式解析时就能先 paint。React 起来后
       通过 window.__forgeaxBoot.done() 让 splash fade-out 并自删。
       (CSS 类名 .fgx-boot-* 还是 forgeax 时代的，会在 rebrand Phase 2 改成 .fgx-boot-*。) -->
  <div class="fgx-boot t-%BRAND_SPLASH_THEME%" data-fgx-boot="1">
    <div class="fgx-boot-card">
      <div class="fgx-boot-head">
        <span class="fgx-boot-dot"></span>
        <span class="fgx-boot-title" id="fgx-boot-title">%BRAND_SPLASH_TITLE%</span>
        <span class="fgx-boot-sub" id="fgx-boot-sub">%BRAND_SPLASH_SUBTITLE%</span>
      </div>
      <div class="fgx-boot-bar" id="fgx-boot-bar">
        <div class="fgx-boot-bar-fill" id="fgx-boot-bar-fill"></div>
      </div>
      <div class="fgx-boot-bar-label">
        <span id="fgx-boot-bar-stage">starting</span>
        <span id="fgx-boot-bar-pct">0%</span>
      </div>
      <p class="fgx-boot-inventory" id="fgx-boot-inv" style="display:none;">
        Bus inventory: <em id="fgx-boot-count">…</em> plugins on <code>/api/bus/plugins</code>
      </p>
      <div class="fgx-boot-fault">
        React shell 启动失败 · 打开 DevTools 控制台查看错误,或直接访问 <code>/api/health</code> / <code>/api/bus/plugins</code> 验证后端。
      </div>
    </div>
  </div>

  <div id="root"></div>

  <script>
    (function () {
      // Brand pack is injected inline at the top of <head> by
      // vite-plugin-brand. Fallback to literal strings if it's missing (e.g.
      // someone served a stripped HTML).
      var BRAND = (typeof window !== 'undefined' && window.__BRAND__) ? window.__BRAND__.config : null;
      var BRAND_ID = (BRAND && BRAND.id) || '%BRAND_ID%';
      var BRAND_SPLASH = (BRAND && BRAND.splash) || { title: '%BRAND_SPLASH_TITLE%', subtitle: '%BRAND_SPLASH_SUBTITLE%', theme: '%BRAND_SPLASH_THEME%' };

      var SPLASH_KEY = BRAND_ID + '.boot.splash.v1';

      var THEMES = { 'classic-lime': 1, 'neon-pulse': 1 };
      var DEFAULTS = {
        v: 1,
        theme: (THEMES[BRAND_SPLASH.theme] ? BRAND_SPLASH.theme : 'classic-lime'),
        title: BRAND_SPLASH.title,
        subtitle: BRAND_SPLASH.subtitle,
        showProgressBar: true,
        showBusInventory: false
      };

      function loadConfig() {
        try {
          var raw = window.localStorage.getItem(SPLASH_KEY);
          if (!raw) return DEFAULTS;
          var p = JSON.parse(raw);
          if (!p || p.v !== 1 || !THEMES[p.theme]) return DEFAULTS;
          return p;
        } catch (_e) { return DEFAULTS; }
      }

      var boot = document.querySelector('.fgx-boot');
      var root = document.getElementById('root');
      var titleEl = document.getElementById('fgx-boot-title');
      var subEl = document.getElementById('fgx-boot-sub');
      var barEl = document.getElementById('fgx-boot-bar');
      var fillEl = document.getElementById('fgx-boot-bar-fill');
      var pctEl = document.getElementById('fgx-boot-bar-pct');
      var stageEl = document.getElementById('fgx-boot-bar-stage');
      var invEl = document.getElementById('fgx-boot-inv');
      var labelEl = barEl ? barEl.nextElementSibling : null;
      if (!boot || !root) return;

      var cfg = loadConfig();
      boot.classList.remove('t-classic-lime', 't-neon-pulse');
      boot.classList.add('t-' + cfg.theme);
      if (titleEl) titleEl.textContent = cfg.title;
      if (subEl) subEl.textContent = cfg.subtitle;
      if (!cfg.showProgressBar) {
        if (barEl) barEl.style.display = 'none';
        if (labelEl) labelEl.style.display = 'none';
      }
      if (cfg.showBusInventory && invEl) invEl.style.display = '';

      var currentPct = 0;
      var stalled = false;
      function setPct(pct, label) {
        if (typeof pct !== 'number' || pct < currentPct) return;
        currentPct = Math.min(100, Math.max(0, pct));
        if (fillEl) fillEl.style.width = currentPct + '%';
        if (pctEl) pctEl.textContent = Math.round(currentPct) + '%';
        if (stageEl && typeof label === 'string') stageEl.textContent = label;
      }

      function clearFault() {
        stalled = false;
        boot.classList.remove('is-faulted');
      }

      window.__forgeaxBoot = {
        progress: function (p) {
          if (!p) return;
          // 任何 React 端汇报都意味着 shell 已经在跑,把 fault 撤回。
          clearFault();
          setPct(p.pct, p.label);
        },
        done: function () {
          clearFault();
          setPct(100, 'ready');
          setTimeout(function () {
            boot.classList.add('is-leaving');
            setTimeout(function () {
              if (boot.parentNode) boot.parentNode.removeChild(boot);
            }, 320);
          }, 80);
        }
      };

      // Inline progress timer climbs 0→80% with ease-out so the bar moves
      // even before main.tsx finishes module fetch. After React calls
      // progress() the bar continues 60 → 92 → 100。
      //
      // Fault detection:dev 模式下 vite 冷编译整棵依赖树可能 5-10 秒,所以
      // 阈值放到 ~13s + 必须 root 仍空才报错。一旦 root.children > 0
      // (createRoot.render 已经把 #root 填充),不管 progress() 调没调到都
      // 主动 clearFault — React 在跑就不该看到红条。
      var TICK_MS = 90;
      var CAP = 80;
      var EASE_TICKS = 30;            // ~2.7s 把 bar 推到 CAP
      var FAULT_TICKS = 150;          // ~13.5s 之后才考虑 fault
      var ticks = 0;
      var iv = setInterval(function () {
        ticks += 1;
        if (boot.classList.contains('is-leaving')) { clearInterval(iv); return; }
        var t = Math.min(1, ticks / EASE_TICKS);
        var target = Math.round(CAP * (1 - Math.pow(1 - t, 2)));
        setPct(target);
        // React 已经渲染到 #root → 把任何遗留 fault 撤回 (即使 React 还
        // 没调到 window.__forgeaxBoot.progress)。
        if (root.children.length > 0 && stalled) clearFault();
        if (ticks > FAULT_TICKS && currentPct >= CAP && root.children.length === 0 && !stalled) {
          stalled = true;
          boot.classList.add('is-faulted');
        }
      }, TICK_MS);
      setTimeout(function () { clearInterval(iv); }, 30000);

      if (cfg.showBusInventory) {
        try {
          fetch('/api/bus/plugins').then(function (r) {
            return r.ok ? r.json() : null;
          }).then(function (d) {
            var el = document.getElementById('fgx-boot-count');
            if (!el || !d) return;
            el.textContent = (d.count != null ? d.count : (Array.isArray(d.items) ? d.items.length : '—'));
          }).catch(function () { /* swallow */ });
        } catch (_e) { /* noop */ }
      }
    })();
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
